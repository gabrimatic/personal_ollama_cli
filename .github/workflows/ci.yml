name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shell dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh jq
      - name: Run checks
        run: zsh scripts/test.sh
