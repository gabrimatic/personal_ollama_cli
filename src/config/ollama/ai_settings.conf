# personal_ollama_cli defaults

# Use a model already pulled in your local Ollama library.
AI_OLLAMA_MODEL=gemma3:4b

# The CLI uses Ollama's chat endpoint and stores conversation history as messages.
AI_OLLAMA_API_URL=http://localhost:11434/api/chat

# Number of user/assistant messages kept in the local context file.
AI_MAX_CONTEXT_MESSAGES=24

# Passed through to Ollama. Use 0 to unload the model after each request.
AI_KEEP_ALIVE=5m

# Optional runtime controls.
# AI_THINK=false
# AI_NUM_CTX=8192
# AI_RESPONSE_FORMAT=json

# Network and persistence controls.
AI_CONNECT_TIMEOUT=5
AI_REQUEST_TIMEOUT=300
AI_CONTEXT_LOCK_TIMEOUT=10
AI_SHOW_STATS=false
